name: Branch Preview

# Deploy any non-main branch to a preview subdirectory on GitHub Pages.
# Preview URL: https://<owner>.github.io/holiday-density/preview/<branch>/
#
# NOTE: GitHub Pages must be configured to serve from the "gh-pages" branch
# (Settings → Pages → Source → Deploy from a branch → gh-pages / root).

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write

concurrency:
  group: "pages-preview-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (branch preview path)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /holiday-density/preview/${{ github.ref_name }}

      - name: Deploy preview to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          destination_dir: preview/${{ github.ref_name }}
          # Keep all other preview and main content intact
          keep_files: true
